---
apiVersion: v1
kind: Namespace
metadata:
  name: miemie-solver
---
# ── ConfigMap: non-sensitive env vars ──────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: solver-config
  namespace: miemie-solver
data:
  OPENAI_API_BASE: "https://api.deepseek.com/v1"
  HF_ENDPOINT: "https://hf-mirror.com"
  LOG_LEVEL: "INFO"
---
# ── Secret: API keys (populate manually) ──────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: solver-secrets
  namespace: miemie-solver
type: Opaque
stringData:
  DEEPSEEK_API_KEY: "<your-deepseek-api-key>"
---
# ── Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miemie-solver
  namespace: miemie-solver
  labels:
    app: miemie-solver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miemie-solver
  template:
    metadata:
      labels:
        app: miemie-solver
    spec:
      containers:
        - name: app
          image: miemie-multiagent-solver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: solver-config
            - secretRef:
                name: solver-secrets
          env:
            - name: RERANKER_MODEL_PATH
              value: "BAAI/bge-reranker-large"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: milvus-data
              mountPath: /app/data
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-pvc
---
# ── PersistentVolumeClaim for Milvus ──────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-pvc
  namespace: miemie-solver
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ── Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: miemie-solver
  namespace: miemie-solver
spec:
  selector:
    app: miemie-solver
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
---
# ── HPA (optional, for production scaling) ────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miemie-solver-hpa
  namespace: miemie-solver
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miemie-solver
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
